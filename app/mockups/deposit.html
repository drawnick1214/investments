<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Dinero - Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 min-h-screen">
    <div class="max-w-2xl mx-auto py-8">
        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <a href="select-type.html" class="text-zinc-400 hover:text-zinc-300 flex items-center gap-2">
                ← Volver
            </a>
            <h1 class="text-xl font-bold flex items-center gap-2">
                💵 <span class="text-emerald-400">INGRESO DE DINERO</span>
            </h1>
            <div class="w-20"></div>
        </div>

        <!-- Form -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">
            <form class="space-y-6">
                <!-- Date -->
                <div>
                    <label class="block text-zinc-400 text-sm mb-2">📅 Fecha</label>
                    <input
                        type="date"
                        value="2026-03-17"
                        class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-zinc-100 focus:border-emerald-500 focus:outline-none"
                    >
                </div>

                <!-- Amount & Currency -->
                <div>
                    <label class="block text-zinc-400 text-sm mb-2">💰 Monto</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input
                            type="number"
                            placeholder="500.00"
                            step="0.01"
                            class="bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-zinc-100 focus:border-emerald-500 focus:outline-none"
                        >
                        <select class="bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-zinc-100 focus:border-emerald-500 focus:outline-none">
                            <option>USD</option>
                            <option>COP</option>
                            <option>EUR</option>
                        </select>
                    </div>
                </div>

                <!-- Destination Account -->
                <div>
                    <label class="block text-zinc-400 text-sm mb-2">🏦 Destino</label>
                    <select class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-zinc-100 focus:border-emerald-500 focus:outline-none">
                        <option>XTB - Cash</option>
                        <option>Trii - Cash</option>
                        <option>Cuenta Ahorros Nu</option>
                        <option>CDT_AUG_26 - Nu Colombia</option>
                        <option>CDT_APR_26 - Nu Colombia</option>
                        <option disabled>─────────────────</option>
                        <option>+ Agregar nueva cuenta</option>
                    </select>
                </div>

                <!-- Notes -->
                <div>
                    <label class="block text-zinc-400 text-sm mb-2">📝 Notas (opcional)</label>
                    <textarea
                        rows="3"
                        placeholder="Ej: Depósito mensual de sueldo"
                        class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-zinc-100 focus:border-emerald-500 focus:outline-none resize-none"
                    ></textarea>
                </div>

                <!-- Conversion Info -->
                <div class="bg-zinc-950 border border-zinc-800 rounded-lg p-4">
                    <div class="text-sm text-zinc-400 mb-1">💱 Conversión automática:</div>
                    <div class="text-lg font-semibold">
                        500.00 USD = <span class="text-emerald-400">1,845,935 COP</span>
                    </div>
                    <div class="text-xs text-zinc-500 mt-1">TRM: 3,691.87</div>
                </div>

                <!-- Buttons -->
                <div class="flex gap-3 pt-4">
                    <a href="select-type.html" class="flex-1 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-semibold py-3 rounded-lg text-center transition-colors">
                        Cancelar
                    </a>
                    <button
                        type="submit"
                        class="flex-1 bg-emerald-500 hover:bg-emerald-400 text-black font-semibold py-3 rounded-lg transition-colors"
                    >
                        ✅ Guardar Ingreso
                    </button>
                </div>
            </form>
        </div>

        <!-- Info Box -->
        <div class="mt-6 bg-emerald-900/20 border border-emerald-800/50 rounded-lg p-4">
            <div class="flex gap-3">
                <div class="text-emerald-400 text-xl">ℹ️</div>
                <div class="text-sm text-zinc-300">
                    <div class="font-semibold mb-1">Este dinero se sumará a tu portafolio</div>
                    <div class="text-zinc-400">
                        No contará como ganancia en tus métricas de rendimiento.
                        Podrás verlo reflejado en la sección de Cash Flows.
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
